name: Backend CI/CD

on:
  push:
    branches: [main, hackmate-backend]
    paths:
      - "hackmate-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "hackmate-backend/**"

jobs:
  # ── CI: lint + test each service in parallel ───────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - team-service
          - scoring-service
          - submission-service
          - notification-service
          - chatbot-service
          - admin-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hackmate_test
          POSTGRES_USER: hackmate
          POSTGRES_PASSWORD: hackmate_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hackmate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hackmate-backend/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: hackmate-backend/${{ matrix.service }}

      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: hackmate-backend/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+psycopg2://hackmate:hackmate_pass@localhost:5432/hackmate_test
          JWT_SECRET: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          UPSTASH_REDIS_REST_URL: ""
          UPSTASH_REDIS_REST_TOKEN: ""
          REDIS_URL: ""
          VAPID_PRIVATE_KEY: ""
          VAPID_PUBLIC_KEY: ""
          VAPID_CLAIMS_EMAIL: ci@hackmate.com

  # ── CD: build & push Docker images to Docker Hub ───────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - team-service
          - scoring-service
          - submission-service
          - notification-service
          - chatbot-service
          - admin-service
          - db-migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: hackmate-backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hackmate-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hackmate-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: placeholder — wire up your server/cloud here ───────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Placeholder: add your deploy step here ──────────────────────────────
      # Examples (uncomment the one you use):
      #
      # SSH into a VPS and pull new images:
