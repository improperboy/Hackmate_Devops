name: Frontend CI/CD

on:
  push:
    branches: [main, hackmate-frontend]
    paths:
      - "hackmate-frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "hackmate-frontend/**"

defaults:
  run:
    working-directory: hackmate-frontend

jobs:
  # ── CI: lint, type-check, test, build ──────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hackmate-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:8000' }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL || 'ws://localhost:8000' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hackmate-frontend/dist/
          retention-days: 7

  # ── CD: runs only on push to main ──────────────────────────────────────────
  cd:
    name: CD
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: hackmate-frontend/dist/

      # ── Placeholder: add your deploy step here ──────────────────────────────
